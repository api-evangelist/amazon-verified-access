aid: amazon-verified-access
name: Amazon Verified Access
description: >-
  AWS Verified Access provides secure access to corporate applications without
  requiring a VPN. It evaluates each application request in real time using
  security signals like identity, device posture, and contextual data to grant
  granular access only to users who meet the specified requirements.
