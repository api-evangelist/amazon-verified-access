apis:
  - aid: amazon-verified-access:amazon-verified-access-api
    name: AWS Verified Access API
    description: >-
      The AWS Verified Access API provides programmatic access to create and
      manage Verified Access instances, groups, endpoints, and trust providers.
      It enables configuring zero-trust network access policies that evaluate
      user identity and device security posture for each application request.
